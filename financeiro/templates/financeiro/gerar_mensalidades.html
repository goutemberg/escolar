{% extends "layout/base.html" %}
{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

{% with tema=user.escola.tema|default:"legacy" %}
{% if tema == "nucleo" %}
<link rel="stylesheet" href="{% static 'css/pages/nucleo.css' %}">
{% else %}
<link rel="stylesheet" href="{% static 'css/pages/turmas/registrar.css' %}">
{% endif %}
{% endwith %}
{% endblock extra_head %}

{% block content %}

<div class="titulo-pagina">
Gerar Mensalidades
</div>

<section class="content-wrapper" style="margin-top:15px;">

<form id="financeiroForm" method="post">

{% csrf_token %}

<div class="form-row">

<div class="form-group">
<label for="turmaSelect">Turma *</label>

<select id="turmaSelect" name="turma_id" class="form-control" required>

<option value="">Selecione</option>

{% for turma in turmas %}
<option value="{{ turma.id }}">{{ turma.nome }}</option>
{% endfor %}

</select>

</div>


<div class="form-group short-field">
<label for="mesInicio">Mês Inicial *</label>

<select id="mesInicio" name="mes_inicio" class="form-control" required>

<option value="">Selecione</option>

<option value="1">Janeiro</option>
<option value="2">Fevereiro</option>
<option value="3">Março</option>
<option value="4">Abril</option>
<option value="5">Maio</option>
<option value="6">Junho</option>
<option value="7">Julho</option>
<option value="8">Agosto</option>
<option value="9">Setembro</option>
<option value="10">Outubro</option>
<option value="11">Novembro</option>
<option value="12">Dezembro</option>

</select>

</div>


<div class="form-group short-field">
<label for="mesFim">Mês Final *</label>

<select id="mesFim" name="mes_fim" class="form-control" required>

<option value="">Selecione</option>

<option value="1">Janeiro</option>
<option value="2">Fevereiro</option>
<option value="3">Março</option>
<option value="4">Abril</option>
<option value="5">Maio</option>
<option value="6">Junho</option>
<option value="7">Julho</option>
<option value="8">Agosto</option>
<option value="9">Setembro</option>
<option value="10">Outubro</option>
<option value="11">Novembro</option>
<option value="12">Dezembro</option>

</select>

</div>


<div class="form-group short-field">
<label for="anoReferencia">Ano *</label>

<input
type="number"
id="anoReferencia"
name="ano"
class="form-control"
required
min="2020"
max="2100">

</div>


<div class="form-group short-field">
<label for="valorMensalidade">Valor *</label>

<input
type="number"
step="0.01"
id="valorMensalidade"
name="valor"
class="form-control"
required>

</div>


<div class="form-group short-field">
<label for="diaVencimento">Dia Vencimento *</label>

<input
type="number"
min="1"
max="31"
id="diaVencimento"
name="dia_vencimento"
class="form-control"
required>

</div>

</div>

<div class="form-footer" style="display:flex;justify-content:flex-end;margin-top:15px;gap:8px">

<button
type="submit"
class="btn btn-outline-success btn-sm">

<i class="bi bi-check-circle"></i>
Gerar Mensalidades

</button>

<button
type="button"
onclick="window.history.back()"
class="btn btn-outline-secondary btn-sm">

<i class="bi bi-x-circle"></i>
Cancelar

</button>

</div>

</form>

</section>

{% endblock content %}
