{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Escolinha - Reset de Senha</title>

  <link href="{% static 'home/css/bootstrap.min.css' %}" rel="stylesheet"/>
  <link href="{% static 'home/css/identidade.css' %}" rel="stylesheet"/>
 

  <style>
    :root{
      --nucleo-primary: #0EA5E9;
      --nucleo-primary-dark: #0284C7;

      --nucleo-rainbow: linear-gradient(90deg,
        #0EA5E9 0%,
        #22C55E 35%,
        #F59E0B 70%,
        #EF4444 100%
      );

      --bg-light: #f8fafc;
      --bg-white: #ffffff;
      --text-dark: #0f172a;
      --text-light: #64748b;
      --border-color: #e2e8f0;
    }

    body{
      min-height: 100vh;
      background:
        radial-gradient(900px 420px at 20% 10%, rgba(14,165,233,.18), transparent 60%),
        radial-gradient(900px 420px at 85% 15%, rgba(34,197,94,.10), transparent 55%),
        linear-gradient(180deg, #ffffff 0%, var(--bg-light) 100%);
      margin: 0;
      color: var(--text-dark);
    }

    .login-wrapper{
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 24px;
    }

    .login-card{
      width: 100%;
      max-width: 440px;
      background: var(--bg-white);
      border: 1px solid var(--border-color);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 45px rgba(0,0,0,.08);
    }

    .login-top{
      position: relative;
      padding: 18px;
      background: rgba(14,165,233,.08);
      border-bottom: 1px solid var(--border-color);
      display:flex;
      align-items:center;
      gap: 12px;
    }

    .login-top::before{
      content:"";
      position:absolute;
      left:0; right:0; top:0;
      height:4px;
      background: var(--nucleo-rainbow);
    }

    .logo-badge{
      width: 70px;
      height: 70px;
      border-radius: 14px;
      background: rgba(14,165,233,.10);
      border: 1px solid rgba(14,165,233,.22);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow: hidden;
    }

    .logo-badge img{
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .login-title{
      font-weight: 900;
      font-size: 18px;
    }

    .login-subtitle{
      font-size: 13px;
      color: var(--text-light);
    }

    .login-body{
      padding: 18px;
    }

    .form-control-custom{
      width: 100%;
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      padding: 10px;
    }

    .btn-login{
      height: 44px;
      width: 100%;
      border-radius: 12px;
      background: var(--nucleo-primary);
      color: #fff;
      font-weight: bold;
      border: none;
    }

    .btn-login:hover{
      background: var(--nucleo-primary-dark);
    }

    .alert{
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-top">
        <div class="logo-badge">
          <img src="{% static 'home/images/logo.png' %}">
        </div>
        <div>
          <div class="login-title">Recuperar Senha</div>
          <div class="login-subtitle">Informe seu CPF para continuar</div>
        </div>
      </div>

      <div class="login-body">

        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-danger">{{ message }}</div>
          {% endfor %}
        {% endif %}

        <form method="POST">
          {% csrf_token %}

          <div class="mb-3">
            <label>CPF</label>
            <input type="text" name="cpf" class="form-control-custom" required>
          </div>

          <button class="btn-login">Continuar</button>
        </form>

        <div style="margin-top:15px; text-align:center;">
          <a href="{% url 'login' %}">Voltar para login</a>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
