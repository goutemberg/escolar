{% extends "layout/base.html" %}
{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
/* ===== OPÇÕES COLORIDAS ===== */
.avaliacao-opcoes {
    display: flex;
    gap: 8px;
}

.avaliacao-opcoes input[type="radio"] {
    display: none;
}

.opcao-label {
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    border: 1.5px solid #ccc;
    transition: 0.2s;
}

/* O - Verde */
.opcao-O {
    color: #2e7d32;
    border-color: #2e7d32;
}
input[type="radio"]:checked + .opcao-O {
    background: #2e7d32;
    color: #fff;
}

/* B - Azul */
.opcao-B {
    color: #1565c0;
    border-color: #1565c0;
}
input[type="radio"]:checked + .opcao-B {
    background: #1565c0;
    color: #fff;
}

/* E - Laranja */
.opcao-E {
    color: #ef6c00;
    border-color: #ef6c00;
}
input[type="radio"]:checked + .opcao-E {
    background: #ef6c00;
    color: #fff;
}

.opcao-label:hover {
    opacity: 0.85;
    transform: scale(1.05);
}
</style>
{% endblock extra_head %}


{% block content %}

<div class="pagina-disciplina">

  <div class="titulo-pagina">Avaliação Infantil</div>

  <!-- FILTROS -->
  <div class="card p-3 mb-3">
      <div class="row g-3">

          <div class="col-md-4">
              <label>Turma</label>
              <select id="turma" class="form-control">
    <option value="">Selecione a turma</option>

    {% for t in turmas %}
        <option value="{{ t.id }}">
            {{ t.nome }}
        </option>
    {% endfor %}
</select>
          </div>

          <div class="col-md-3">
              <label>Bimestre</label>
              <select id="bimestre" class="form-control">
                  <option value="1">1º</option>
                  <option value="2">2º</option>
                  <option value="3">3º</option>
                  <option value="4">4º</option>
              </select>
          </div>

         <div class="col-md-3 d-flex align-items-end">
    <button
        type="button"
        class="w-100"
        onclick="carregarDados()"
        style="
            background: transparent;
            color: #fab982;
            border: 1.5px solid #fab982;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.2s;
        "
        onmouseover="this.style.backgroundColor='#fab982'; this.style.color='#fff'"
        onmouseout="this.style.backgroundColor='transparent'; this.style.color='#fab982'"
    >
        <i class="bi bi-search"></i> Carregar
    </button>
</div>

      </div>
  </div>

  <!-- RESULTADO -->
  <div id="avaliacoesContainer"></div>

  <!-- BOTÕES -->
  <div class="form-footer mt-3">

    <button
        type="button"
        class="me-2"
        onclick="salvar()"
        style="
            background: transparent;
            color: #fab982;
            border: 1.5px solid #fab982;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.2s;
        "
        onmouseover="this.style.backgroundColor='#fab982'; this.style.color='#fff'"
        onmouseout="this.style.backgroundColor='transparent'; this.style.color='#fab982'"
    >
        <i class="bi bi-check-circle"></i> Salvar Avaliações
    </button>

    <button
        type="button"
        onclick="window.location.href='{% url 'index' %}'"
        style="
            background: transparent;
            color: #6c757d;
            border: 1.5px solid #6c757d;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.2s;
        "
        onmouseover="this.style.backgroundColor='#6c757d'; this.style.color='#fff'"
        onmouseout="this.style.backgroundColor='transparent'; this.style.color='#6c757d'"
    >
        <i class="bi bi-x-circle"></i> Cancelar
    </button>

</div>

</div>

{% endblock content %}


{% block extra_js %}

<script>
let alunos = [];
let itens = JSON.parse('{{ itens|escapejs }}');


// =========================
// CARREGAR TURMAS (VOLTOU 🔥)
// =========================
function carregarTurmas() {

    fetch('/buscar-turmas/')
    .then(res => res.json())
    .then(data => {

        console.log("TURMAS:", data); // DEBUG

        if (data.erro) {
            alert(data.erro);
            return;
        }

        let select = document.getElementById("turma");

        select.innerHTML = '<option value="">Selecione a turma</option>';

        data.turmas.forEach(turma => {
            select.innerHTML += `<option value="${turma.id}">${turma.nome}</option>`;
        });

    })
    .catch(() => {
        alert("Erro ao carregar turmas");
    });
}


// =========================
// CARREGAR DADOS (ALUNOS + AVALIAÇÕES)
// =========================
function carregarDados() {

    const turmaId = document.getElementById("turma").value;
    const bimestre = document.getElementById("bimestre").value;

    if (!turmaId) {
        alert("Selecione uma turma");
        return;
    }

    Promise.all([
        fetch(`/buscar-alunos-por-turma/?turma_id=${turmaId}`),
        fetch(`/buscar-avaliacoes-infantil/?turma_id=${turmaId}&bimestre=${bimestre}`)
    ])
    .then(async ([resAlunos, resAvaliacoes]) => {

        const dataAlunos = await resAlunos.json();
        const dataAvaliacoes = await resAvaliacoes.json();

        console.log("ALUNOS:", dataAlunos);
        console.log("AVALIAÇÕES:", dataAvaliacoes);

        if (dataAlunos.erro) {
            alert(dataAlunos.erro);
            return;
        }

        alunos = dataAlunos.alunos;
        window.avaliacoesSalvas = dataAvaliacoes.avaliacoes || {};

        montarTela();
    });
}


// =========================
// MONTAR TELA
// =========================
function montarTela() {

    let html = '';
    let categoriaAtual = null;

    itens.forEach(item => {

        // 🔥 NOVA CATEGORIA
        if (categoriaAtual !== item.categoria_id) {

            // fecha card anterior
            if (categoriaAtual !== null) {
                html += `</div>`;
            }

            categoriaAtual = item.categoria_id;

            html += `
                <div class="card p-3 mb-3">
                    <h5>${item.categoria_nome}</h5>
            `;
        }

        // 🔥 DESCRIÇÃO DO ITEM
        html += `
            <div class="mt-3 mb-2">
                <strong>${item.descricao}</strong>
            </div>
        `;

        // 🔥 LISTA DE ALUNOS
        alunos.forEach(aluno => {

            let valorSalvo = window.avaliacoesSalvas?.[aluno.id]?.[item.id] || '';

            html += `
                <div class="d-flex justify-content-between align-items-center mb-2">
                    
                    <span>${aluno.nome}</span>

                    <div class="avaliacao-opcoes">

                        <input type="radio"
                            id="O_${item.id}_${aluno.id}"
                            name="item_${item.id}_aluno_${aluno.id}"
                            value="O"
                            ${valorSalvo === 'O' ? 'checked' : ''}>
                        <label for="O_${item.id}_${aluno.id}" class="opcao-label opcao-O">O</label>

                        <input type="radio"
                            id="B_${item.id}_${aluno.id}"
                            name="item_${item.id}_aluno_${aluno.id}"
                            value="B"
                            ${valorSalvo === 'B' ? 'checked' : ''}>
                        <label for="B_${item.id}_${aluno.id}" class="opcao-label opcao-B">B</label>

                        <input type="radio"
                            id="E_${item.id}_${aluno.id}"
                            name="item_${item.id}_aluno_${aluno.id}"
                            value="E"
                            ${valorSalvo === 'E' ? 'checked' : ''}>
                        <label for="E_${item.id}_${aluno.id}" class="opcao-label opcao-E">E</label>

                    </div>

                </div>
            `;
        });

    });

    // 🔥 fecha último card
    html += `</div>`;

    document.getElementById("avaliacoesContainer").innerHTML = html;
}

// =========================
// SALVAR
// =========================
function salvar() {

    const turma_id = document.getElementById("turma").value;
    const bimestre = document.getElementById("bimestre").value;

    let avaliacoes = [];

    alunos.forEach(aluno => {

        let respostas = {};

        itens.forEach(item => {

            let radios = document.getElementsByName(`item_${item.id}_aluno_${aluno.id}`);

            radios.forEach(r => {
                if (r.checked) {
                    respostas[item.id] = r.value;
                }
            });

        });

        avaliacoes.push({
            aluno_id: aluno.id,
            respostas: respostas
        });
    });

    fetch("/salvar-avaliacao-infantil/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({
            turma_id,
            bimestre,
            avaliacoes
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.ok) {
            alert("Avaliações salvas com sucesso!");
        } else {
            alert(data.erro);
        }
    });
}


// =========================
// CSRF
// =========================
function getCSRFToken() {
    return document.cookie.split('; ')
        .find(row => row.startsWith('csrftoken'))
        ?.split('=')[1];
}


// =========================
// INIT
// =========================
document.addEventListener("DOMContentLoaded", function() {
    console.log("Página carregada");

    carregarTurmas(); // 🔥 ESSENCIAL
});
</script>
{% endblock extra_js %}
