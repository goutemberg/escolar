{% extends "layout/base.html" %}
{% load static %}

{% block content %}

  <!-- HERO / LOGO PRINCIPAL (card clean, sem filete sólido) -->
  <section style="padding: 26px 0 14px;">
    <div style="display:flex; justify-content:center;">
      <div style="
        width: 100%;
        max-width: 760px;
        overflow: hidden;
        backdrop-filter: blur(2px);
      ">
        <div style="padding: 22px 18px 20px; text-align:center;">
          <img
            src="{% static 'themes/' %}{{ user.escola.tema|default:'nucleo' }}/hero-logo.png"
            alt="Logo"
            {% comment %} style="width:100%; max-width: 520px; height:auto; object-fit:contain;" {% endcomment %}
            style="width:min(900px, 92%); max-height: 70vh; height:auto; object-fit:contain;"
            onerror="this.onerror=null; this.src='{% static 'themes/' %}{{ user.escola.tema|default:'nucleo' }}/logo.png';"
          >

          <div style="margin-top: 10px; color:#64748b; font-size: 14px;">
            Bem-vindo(a), <strong style="color:#0f172a;">{{ user.get_full_name|default:user.username }}</strong>
          </div>
        </div>
      </div>
    </div>
  </section>

{% endblock content %}
