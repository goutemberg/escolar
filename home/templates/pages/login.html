{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Login - Núcleo Escolar</title>

  <link href="{% static 'home/css/bootstrap.min.css' %}" rel="stylesheet"/>
  

  <style>
    :root{
      --nucleo-primary: #0EA5E9;
      --nucleo-primary-dark: #0284C7;

      --nucleo-rainbow: linear-gradient(90deg,
        #0EA5E9 0%,
        #22C55E 35%,
        #F59E0B 70%,
        #EF4444 100%
      );

      --bg-light: #f8fafc;
      --bg-white: #ffffff;
      --text-dark: #0f172a;
      --text-light: #64748b;
      --border-color: #e2e8f0;
    }

    body{
      min-height: 100vh;
      background:
        radial-gradient(900px 420px at 20% 10%, rgba(14,165,233,.18), transparent 60%),
        radial-gradient(900px 420px at 85% 15%, rgba(34,197,94,.10), transparent 55%),
        linear-gradient(180deg, #ffffff 0%, var(--bg-light) 100%);
      color: var(--text-dark);
      margin: 0;
    }

    .login-wrapper{
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 24px;
    }

    .login-card{
      width: 100%;
      max-width: 440px;
      background: var(--bg-white);
      border: 1px solid var(--border-color);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 45px rgba(0,0,0,.08);
    }

    .login-top{
      position: relative;
      padding: 18px 18px 14px;
      background: rgba(14,165,233,.08);
      border-bottom: 1px solid var(--border-color);
      box-shadow: inset 0 3px 0 rgba(14,165,233,.55);
      display:flex;
      align-items:center;
      gap: 12px;
    }

    .login-top::before{
      content:"";
      position:absolute;
      left:0; right:0; top:0;
      height:4px;
      background: var(--nucleo-rainbow);
    }

    .logo-badge{
      width: 70px;
      height: 70px;
      border-radius: 14px;
      background: rgba(14,165,233,.10);
      border: 1px solid rgba(14,165,233,.22);
      display:flex;
      align-items:center;
      justify-content:center;
      flex: 0 0 auto;
      overflow: hidden;
      padding: 6px;
    }

    .logo-badge img{
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .login-head{
      flex: 1;
      min-width: 0;
    }

    .login-title{
      margin: 0;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: .2px;
      color: var(--text-dark);
      line-height: 1.15;
    }

    .login-subtitle{
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--text-light);
    }

    .login-body{
      padding: 18px;
    }

    label{
      display:block;
      font-size: .86rem;
      margin-bottom: 6px;
      color: var(--text-dark);
      font-weight: 700;
    }

    .form-control-custom{
      width: 100%;
      height: 44px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      font-size: .95rem;
      background: #fff;
      color: var(--text-dark);
      box-sizing: border-box;
      transition: all .2s ease;
    }

    .form-control-custom:focus{
      outline: none;
      border-color: rgba(14,165,233,.60);
      box-shadow: 0 0 0 3px rgba(14,165,233,.18);
    }

    .btn-login{
      height: 44px;
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--nucleo-primary);
      background: var(--nucleo-primary);
      color: #fff;
      font-weight: 900;
      font-size: .95rem;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap: 8px;
      transition: all .2s ease;
    }

    .btn-login:hover{
      background: var(--nucleo-primary-dark);
      border-color: var(--nucleo-primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0,0,0,.10);
    }

    .alert-danger{
      font-size: .92rem;
      border-radius: 12px;
      border: 1px solid rgba(220,53,69,.18);
      background: rgba(220,53,69,.08);
      color: #842029;
      padding: 10px 12px;
      margin-bottom: 14px;
    }

    .helper{
      margin-top: 12px;
      font-size: 12.5px;
      color: var(--text-light);
      text-align: center;
    }

    .helper strong{
      color: var(--nucleo-primary-dark);
    }

    .forgot-password{
      margin-top: 10px;
      text-align: right;
    }

    .forgot-password a{
      font-size: 13px;
      color: var(--nucleo-primary);
      text-decoration: none;
      font-weight: 600;
    }

    .forgot-password a:hover{
      text-decoration: underline;
      color: var(--nucleo-primary-dark);
    }

  </style>
</head>

<body>
  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-top">
        <div class="logo-badge">
          <img alt="Logo Núcleo Escolar" src="{% static 'home/images/logo.png' %}"/>
        </div>

        <div class="login-head">
          <h2 class="login-title">Acesso ao Sistema</h2>
          <div class="login-subtitle">Entre com suas credenciais para continuar</div>
        </div>
      </div>

      <div class="login-body">
        <form id="loginForm" action="{% url 'login' %}" method="POST">
          {% csrf_token %}

          {% if form.errors %}
            <div class="alert alert-danger">
              CPF e/ou senha inválidos. Tente novamente.
            </div>
          {% endif %}

          <div class="form-group mb-3">
            <label for="username">CPF</label>
            <input
              id="username"
              class="form-control-custom"
              name="username"
              placeholder="Digite seu CPF"
              required
              type="text"
            />
          </div>

          <div class="form-group mb-3">
            <label for="password">Senha</label>
            <input
              id="password"
              class="form-control-custom"
              name="password"
              placeholder="Digite sua Senha"
              required
              type="password"
            />
          </div>

          <!-- 🔥 NOVO -->
          <div class="forgot-password">
            <a href="{% url 'reset_senha:reset_senha' %}">Esqueci minha senha</a>
          </div>

        <!-- 🔥 NOVO BLOCO -->
        <div id="escolaBox" class="mb-3" style="display:none;">
        <label>Escolha a escola</label>
        <select id="escolaSelect" class="form-control-custom"></select>
        </div>

          <button class="btn-login" type="submit">
            Entrar
          </button>

          <div class="helper">
            © {{ now|date:"Y" }} <strong>Núcleo Escolar</strong> • Gestão Escolar
          </div>
        </form>
      </div>

    </div>
  </div>
<script>
document.addEventListener("DOMContentLoaded", function () {

  const form = document.querySelector("#loginForm");
  if (!form) return;

  const escolaBox = document.getElementById("escolaBox");
  const escolaSelect = document.getElementById("escolaSelect");

  let escolaInput = document.getElementById("escola_id");
  if (!escolaInput) {
    escolaInput = document.createElement("input");
    escolaInput.type = "hidden";
    escolaInput.name = "escola_id";
    escolaInput.id = "escola_id";
    form.appendChild(escolaInput);
  }

  let multiMode = false;

  function getCSRFToken() {
    return document.querySelector('[name=csrfmiddlewaretoken]').value;
  }

  form.addEventListener("submit", async function (e) {

    e.preventDefault();

    // 🔥 se já está no modo seleção → só valida e continua
    if (multiMode) {

      const escolaId = escolaSelect.value;

      if (!escolaId) {
        alert("Selecione uma escola");
        return;
      }

      escolaInput.value = escolaId;

      // 🔥 agora deixa o form seguir NORMAL (SEM FETCH)
      form.removeEventListener("submit", arguments.callee);
      form.submit();
      return;
    }

    const formData = new FormData(form);

    try {

      const response = await fetch(form.action, {
        method: "POST",
        headers: {
          "X-CSRFToken": getCSRFToken()
        },
        body: formData,
        credentials: "same-origin"
      });

      const text = await response.text();

      let result = null;

      try {
        result = JSON.parse(text);
      } catch (err) {
        // 🔥 resposta HTML normal (login padrão Django)
        document.open();
        document.write(text);
        document.close();
        return;
      }

      // 🔥 MULTI ESCOLA
      if (result.multi_escola) {

        escolaBox.style.display = "block";
        escolaSelect.innerHTML = "";

        result.escolas.forEach(e => {
          const opt = document.createElement("option");
          opt.value = e.id;
          opt.textContent = e.nome;
          escolaSelect.appendChild(opt);
        });

        multiMode = true;
        return;
      }

      // 🔥 REDIRECT (trocar senha)
      if (result.redirect) {
        window.location.href = result.redirect;
        return;
      }

      // 🔥 LOGIN OK
      if (result.success) {
        window.location.href = "/";
        return;
      }

      alert("CPF ou senha inválidos");

    } catch (error) {
      console.error("Erro no login:", error);
      alert("Erro ao conectar com o servidor");
    }

  });

});
</script>
</body>
</html>
