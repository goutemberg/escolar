{% extends "layout/base.html" %}
{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
  /* 🔥 Corrige transparência da tabela */
  .table thead th {
    background-color: #f8f9fa !important;
    color: #212529 !important;
    font-weight: 600;
  }

  .table tbody td {
    color: #212529 !important;
    background-color: #ffffff !important;
  }

  .table a {
    color: #fff !important;
  }
</style>
{% endblock extra_head %}

{% block content %}

<div class="titulo-pagina">Selecionar Turma e Aluno</div>

<form class="form-inline mb-3" method="get">

  <input type="hidden" name="tipo" value="turma">

  <label class="mr-2" for="turma">Turma:</label>

  <select class="form-control mr-2" id="turma" name="turma" onchange="this.form.submit()">
    <option value="">-- Selecione --</option>

    {% for turma in turmas %}
      <option value="{{ turma.id }}"
        {% if turma.id|stringformat:'s' == turma_id %}selected{% endif %}>
        {{ turma.nome }} - {{ turma.turno }}
      </option>
    {% endfor %}
  </select>

  <button class="btn btn-primary" type="submit">
    Filtrar
  </button>

</form>

{% if alunos %}
<table class="table table-bordered">
  <thead>
    <tr>
      <th>Nome do Aluno</th>
      <th style="width:220px;">Ações</th>
    </tr>
  </thead>

  <tbody>

  {% for aluno in alunos %}
    <tr>
      <td>{{ aluno.nome }}</td>

      <td>
        <a class="btn btn-sm btn-info"
           href="{% url 'visualizar_boletim' aluno.id %}?turma={{ turma_id }}">
           Visualizar Boletim
        </a>
      </td>
    </tr>
  {% endfor %}

  </tbody>
</table>
{% endif %}

{% endblock content %}
